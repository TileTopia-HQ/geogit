name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: Check & Clippy (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]
    steps:
      - uses: actions/checkout@v4
      - name: Bootstrap Rust (macOS)
        if: runner.os == 'macOS'
        run: |
          rustup-init -y --default-toolchain stable --component clippy
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        if: runner.os != 'macOS'
        with:
          components: clippy
      - run: cargo check --all-targets
        shell: bash
      - run: cargo clippy --all-targets -- -D warnings
        shell: bash

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  test:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]
    steps:
      - uses: actions/checkout@v4
      - name: Bootstrap Rust (macOS)
        if: runner.os == 'macOS'
        run: |
          rustup-init -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        if: runner.os != 'macOS'
      - run: cargo test --workspace
        shell: bash
